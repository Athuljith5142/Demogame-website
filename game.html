<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,Paper,Scissors</title>
    <style src></style>
</head>
<link rel="stylesheet" href="./style.css">
<body>
    <h3><span>R</span>ock - <span>Paper</span> - <span>S</span>cissor </h3>
    <div class="box">
    
    <button onclick="rock()" class="b1" id="p1"><img src="./Assets/rock-emoji.png" alt="rock" class="ig"> </button>
        
    <button onclick="paper()" class="b1" id="p2"><img src="./Assets/paper-emoji.png" alt="paper" class="ig"></button>

    <button onclick="scissors()" class="b1" id="p3"> <img src="./Assets/scissors-emoji.png" alt="scissors" class="ig"></button>
</div>

<h4>Result</h4> 
<p class="p1" > You<img src="./Assets/${choice}-emoji.png" alt="" class="po" id="user">
     &nbsp;&nbsp;&nbsp;&nbsp;<span> VS </span>
           <img src="./Assets/${choice}-emoji.png" alt="" class="po" id="computer">
Computer
</p>

<h4>Score <span>= </span>board</h4>

<div class="tab">
<table  class="tbl" border="5">
    <tr>
        <th>Win</th>
        <th>Loss</th>
        <th>Tie</th>
    </tr>

    <tr>
        <td><p class="j-score"></p></td>
        <td><p class="jb-score"></p></td>
        <td><p class="jd-score"></p></td>
    </tr>
</table>

</div>

<div class="cl">
<button id="b2" onclick="
Score.win = 0;
Score.loss = 0;
Score.tie = 0;
document.getElementById('user').src = '';
document.getElementById('computer').src = '';
localStorage.removeItem('Score');
document.querySelector('.j-score').innerHTML=`${Score.win}`;
document.querySelector('.jb-score').innerHTML=`${Score.loss}`;
document.querySelector('.jd-score').innerHTML=`${Score.tie}`;

"> Reset </button></div>
<script src="./logic.js"></script>
</body>
</html>
